name: Load Test

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to test'
        required: true
        type: string
      pattern:
        description: 'Load pattern'
        required: true
        type: choice
        options:
          - spike
          - ramp
          - sustained
      duration:
        description: 'Test duration (seconds)'
        required: false
        default: 60
        type: number
      concurrency:
        description: 'Concurrency level'
        required: false
        default: 50
        type: number
      run_id:
        description: 'Unique run identifier'
        required: true
        type: string

jobs:
  load-test:
    name: "Load Test ${{ github.event.inputs.pattern }} - ${{ github.event.inputs.run_id }}"
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install autocannon
        run: npm install -g autocannon

      - name: Run load test
        id: loadtest
        run: |
          set -e
          PATTERN="${{ github.event.inputs.pattern }}"
          TARGET_URL="${{ github.event.inputs.target_url }}"
          DURATION="${{ github.event.inputs.duration }}"
          CONCURRENCY="${{ github.event.inputs.concurrency }}"
          RUN_ID="${{ github.event.inputs.run_id }}"
          LOGS=()
          TIMESTAMP() { date -u +"%Y-%m-%dT%H:%M:%SZ"; }

          if [ "$PATTERN" = "spike" ]; then
            LOGS+=("$(TIMESTAMP): Starting spike test")
            autocannon -j -d "$DURATION" -c "$CONCURRENCY" "$TARGET_URL" > result.json
          elif [ "$PATTERN" = "ramp" ]; then
            LOGS+=("$(TIMESTAMP): Starting ramp test")
            INTERVAL=10
            CURRENT=10
            END=$CONCURRENCY
            DURATION_LEFT=$DURATION
            while [ $CURRENT -le $END ] && [ $DURATION_LEFT -gt 0 ]; do
              THIS_DURATION=$(( INTERVAL < DURATION_LEFT ? INTERVAL : DURATION_LEFT ))
              LOGS+=("$(TIMESTAMP): Running $CURRENT concurrency for $THIS_DURATION seconds")
              autocannon -j -d "$THIS_DURATION" -c "$CURRENT" "$TARGET_URL" > ramp.json
              if [ ! -s result.json ]; then
                # First iteration: use ramp.json as result.json
                cp ramp.json result.json
              else
                # Subsequent iterations: merge results
                jq -s '.[0] * .[1]' result.json ramp.json > tmp.json && mv tmp.json result.json
              fi
              CURRENT=$((CURRENT + 10))
              DURATION_LEFT=$((DURATION_LEFT - THIS_DURATION))
            done
          elif [ "$PATTERN" = "sustained" ]; then
            LOGS+=("$(TIMESTAMP): Starting sustained test")
            autocannon -j -d "$DURATION" -c "$CONCURRENCY" "$TARGET_URL" > result.json
          else
            echo "Unknown pattern: $PATTERN" && exit 1
          fi

          LOGS+=("$(TIMESTAMP): Test complete")
          echo "${LOGS[@]}" | jq -R -s -c 'split("\n") | map(select(length > 0))' > logs.json

      - name: Parse and post results to Supabase
        run: |
          set -e
          RUN_ID="${{ github.event.inputs.run_id }}"
          TARGET_URL="${{ github.event.inputs.target_url }}"
          PATTERN="${{ github.event.inputs.pattern }}"
          DURATION="${{ github.event.inputs.duration }}"
          CONCURRENCY="${{ github.event.inputs.concurrency }}"
          LOGS=$(cat logs.json)
          
          # Build the payload using jq to ensure all values are valid JSON
          curl -X POST "$SUPABASE_URL/rest/v1/test_runs" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY" \
            -H "Content-Type: application/json" \
            -d @<(jq -n \
              --arg run_id "$RUN_ID" \
              --arg target_url "$TARGET_URL" \
              --arg patterns "$PATTERN" \
              --arg status "complete" \
              --argjson duration "$DURATION" \
              --argjson concurrency "$CONCURRENCY" \
              --argjson runner_logs "$LOGS" \
              --slurpfile result result.json \
              '{
                run_id: $run_id,
                target_url: $target_url,
                patterns: $patterns,
                duration: $duration,
                concurrency: $concurrency,
                total_requests: ($result[0].requests.total // 0),
                avg_latency: ($result[0].latency.average // 0),
                p50_latency: ($result[0].latency.p50 // 0),
                p95_latency: ($result[0].latency.p95 // 0),
                p99_latency: ($result[0].latency.p99 // 0),
                error_rate: ($result[0].errors // 0),
                peak_throughput: ($result[0].throughput.max // 0),
                status: $status,
                runner_logs: $runner_logs,
                latency_buckets: ($result[0].latency | if has("buckets") then .buckets else {} end)
              }')
